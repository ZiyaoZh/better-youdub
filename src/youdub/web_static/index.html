<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouDub</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20260620-tts-redub-ui2" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>YouDub</h1>
          <p id="runtimeLine">Loading runtime</p>
        </div>
        <div class="topbar-actions">
          <button id="refreshButton" class="icon-button" title="刷新" type="button">↻</button>
        </div>
      </header>

      <main class="workspace">
        <section class="panel tasks-panel">
          <div class="panel-head">
            <div class="panel-title-row">
              <h2>任务</h2>
              <span id="taskCount" class="counter">0</span>
            </div>
            <button id="newTaskButton" class="button secondary compact-button" type="button">新建</button>
          </div>
          <div id="taskList" class="task-list"></div>
        </section>

        <section class="panel detail-panel">
          <div id="emptyDetail" class="empty-state">
            <h2>选择一个任务</h2>
            <p>任务详情、步骤执行和产物会显示在这里。</p>
          </div>
          <div id="taskDetail" class="hidden">
            <div class="detail-header">
              <div>
                <h2 id="detailTitle"></h2>
                <p id="detailSource"></p>
              </div>
              <span id="detailStatus" class="status-badge"></span>
            </div>

            <div class="meta-grid">
              <div><span>任务 ID</span><strong id="detailId"></strong></div>
              <div><span>作者</span><strong id="detailAuthor"></strong></div>
              <div><span>目录</span><strong id="detailFolder"></strong></div>
              <div><span>更新时间</span><strong id="detailUpdated"></strong></div>
            </div>

            <div class="run-bar">
              <button id="runAllButton" class="button primary" type="button">运行完整链路</button>
              <button id="workflowConfigButton" class="button secondary" type="button">流程参数</button>
              <button id="deleteButton" class="button danger" type="button">删除任务记录</button>
            </div>

            <div class="section-title">步骤</div>
            <div id="stepsGrid" class="steps-grid"></div>

            <div class="section-title">产物</div>
            <div id="artifactList" class="artifact-list"></div>

            <div id="videoPreview" class="video-preview hidden">
              <div class="video-preview-actions">
                <button id="openVideoPreviewButton" class="button secondary" type="button">打开播放器</button>
                <button id="closeVideoPreviewButton" class="button secondary hidden" type="button">停止加载</button>
              </div>
              <video id="finalVideo" class="hidden" controls preload="none"></video>
            </div>

            <div id="detailError" class="error-box hidden"></div>
          </div>
        </section>
      </main>
    </div>

    <aside id="createDialog" class="modal" aria-hidden="true">
      <div class="modal-backdrop" data-close-create></div>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="createDialogTitle">
        <div class="modal-head">
          <h2 id="createDialogTitle">新建任务</h2>
          <button class="icon-button" data-close-create title="关闭" type="button">×</button>
        </div>
        <form id="urlForm" class="create-form">
          <label>
            <span>视频 URL</span>
            <input id="urlInput" name="url" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off" />
          </label>
          <div class="form-actions single-action">
            <button class="button primary" type="submit">创建任务</button>
          </div>
          <div id="createMessage" class="message"></div>
        </form>
      </div>
    </aside>

    <aside id="configDrawer" class="drawer" aria-hidden="true">
      <div class="drawer-backdrop" data-close-config></div>
      <div class="drawer-panel">
        <div class="drawer-head">
          <h2 id="configDrawerTitle">任务参数</h2>
          <button class="icon-button" data-close-config title="关闭" type="button">×</button>
        </div>
        <form id="taskConfigForm" class="task-config-form">
          <div id="taskConfigTabs" class="config-tabs"></div>
          <div id="taskConfigFields" class="config-fields"></div>
          <div class="config-actions">
            <button id="saveTaskConfigButton" class="button primary" type="submit">保存任务参数</button>
            <div id="taskConfigMessage" class="message"></div>
          </div>
        </form>
      </div>
    </aside>

    <script src="/assets/app.js?v=20260620-tts-redub-ui2"></script>
  </body>
</html>
