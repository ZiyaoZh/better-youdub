services:
  youdub-gpu:
    build:
      context: .
      dockerfile: docker/app.gpu.Dockerfile
    image: youdub-linux:gpu
    working_dir: /app
    user: "${YOUDUB_UID:-1064}:${YOUDUB_GID:-1065}"
    gpus: all
    environment:
      PYTHONPATH: /app/src
      YOUDUB_ROOT: /data/videos
      YOUDUB_TASKS_PATH: /data/tasks/tasks.json
      YOUDUB_LOG_DIR: /data/logs
      YOUDUB_MODELS_DIR: /models
      HF_HOME: /cache/huggingface
      TORCH_HOME: /cache/torch
    volumes:
      - ./data/samples:/data/samples:ro
      - ./data/videos:/data/videos
      - ./data/tasks:/data/tasks
      - ./data/logs:/data/logs
      - ./models:/models
      - ./data/cache/huggingface:/cache/huggingface
      - ./data/cache/torch:/cache/torch
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ["scripts/check_gpu.sh"]
