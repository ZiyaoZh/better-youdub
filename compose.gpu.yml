services:
  youdub-gpu:
    build:
      context: .
      dockerfile: docker/app.gpu.Dockerfile
    image: youdub-linux:gpu
    working_dir: /app
    user: "${YOUDUB_UID:-1064}:${YOUDUB_GID:-1065}"
    gpus: all
    environment:
      PYTHONPATH: /app/src
      YOUDUB_ROOT: /data/videos
      YOUDUB_TASKS_PATH: /data/tasks/tasks.json
      YOUDUB_LOG_DIR: /data/logs
      YOUDUB_MODELS_DIR: /models
      YOUDUB_CONFIG_PATH: /data/config/youdub.json
      HF_HOME: /cache/huggingface
      TORCH_HOME: /cache/torch
      HOME: /tmp
      MPLCONFIGDIR: /tmp/youdub-cache/matplotlib
      XDG_CACHE_HOME: /tmp/youdub-cache/xdg
      TORCH_FORCE_NO_WEIGHTS_ONLY_LOAD: "1"
      HF_READ_TOKEN: ${HF_READ_TOKEN:-}
      YOUDUB_WHISPER_MODEL: ${YOUDUB_WHISPER_MODEL:-large-v2}
      YOUDUB_WHISPER_DEVICE: ${YOUDUB_WHISPER_DEVICE:-auto}
      YOUDUB_WHISPER_BATCH_SIZE: ${YOUDUB_WHISPER_BATCH_SIZE:-32}
      YOUDUB_WHISPER_DIARIZATION: ${YOUDUB_WHISPER_DIARIZATION:-1}
      YOUDUB_WHISPER_MIN_SPEAKERS: ${YOUDUB_WHISPER_MIN_SPEAKERS:-}
      YOUDUB_WHISPER_MAX_SPEAKERS: ${YOUDUB_WHISPER_MAX_SPEAKERS:-}
    volumes:
      - ./data/samples:/data/samples:ro
      - ./data/videos:/data/videos
      - ./data/tasks:/data/tasks
      - ./data/logs:/data/logs
      - ./data/config:/data/config
      - ./models:/models
      - ./data/cache/huggingface:/cache/huggingface
      - ./data/cache/torch:/cache/torch
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ["scripts/check_gpu.sh"]
