services:
  youdub-dev:
    build:
      context: .
      dockerfile: docker/app.cpu.Dockerfile
    image: youdub-linux:dev
    working_dir: /app
    user: "${YOUDUB_UID:-1064}:${YOUDUB_GID:-1065}"
    environment:
      PYTHONPATH: /app/src
      YOUDUB_ROOT: /data/videos
      YOUDUB_TASKS_PATH: /data/tasks/tasks.json
      YOUDUB_LOG_DIR: /data/logs
      YOUDUB_MODELS_DIR: /models
    volumes:
      - .:/app
      - ./data/videos:/data/videos
      - ./data/tasks:/data/tasks
      - ./data/logs:/data/logs
      - ./models:/models
    command: ["youdub", "doctor"]
