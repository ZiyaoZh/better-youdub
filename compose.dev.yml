services:
  youdub-dev:
    build:
      context: .
      dockerfile: docker/app.cpu.Dockerfile
    image: youdub-linux:dev
    working_dir: /app
    environment:
      PYTHONPATH: /app/src
      YOUDUB_UID: ${YOUDUB_UID:-1064}
      YOUDUB_GID: ${YOUDUB_GID:-1065}
      YOUDUB_ROOT: /data/videos
      YOUDUB_TASKS_PATH: /data/tasks/tasks.json
      YOUDUB_LOG_DIR: /data/logs
      YOUDUB_MODELS_DIR: /models
      YOUDUB_CONFIG_PATH: /data/config/youdub.json
      YOUDUB_COOKIES_PATH: /data/cookies/cookies.txt
      YOUDUB_YTDLP_PROXY: ${YOUDUB_YTDLP_PROXY:-}
      YOUDUB_DOWNLOAD_MAX_HEIGHT: ${YOUDUB_DOWNLOAD_MAX_HEIGHT:-}
    volumes:
      - .:/app
      - ./data/videos:/data/videos
      - ./data/tasks:/data/tasks
      - ./data/logs:/data/logs
      - ./data/config:/data/config
      - ./data/cookies:/data/cookies
      - ./models:/models
    ports:
      - "${YOUDUB_WEB_PORT:-49173}:8000"
    command: ["uvicorn", "youdub.web:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
